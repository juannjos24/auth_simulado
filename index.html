<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Control de Acceso</title>
    <!-- Enlace a nuestra hoja de estilos -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        
        <!-- ========================================
             SECCIÓN DE LOGIN
             Se muestra cuando el usuario NO está autenticado
        ======================================== -->
        <div id="login-section" class="section">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">Ingresa tus credenciales para acceder</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" placeholder="Ej: sumador, multiplicador, admin">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">
                </div>
                
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            
            <!-- Mensaje de error (oculto por defecto) -->
            <p id="error-message" class="error hidden"></p>
            
            <!-- Información de usuarios disponibles -->
            <div class="info-box">
                <h3>Usuarios disponibles:</h3>
                <ul>
                    <li><strong>sumador</strong> / 1234 → Calculadora de sumas</li>
                    <li><strong>multiplicador</strong> / 1234 → Calculadora de multiplicaciones</li>
                </ul>
            </div>
        </div>

        <!-- ========================================
             SECCIÓN DE CALCULADORA
             Se muestra cuando el usuario SÍ está autenticado
        ======================================== -->
        <div id="calculator-section" class="section hidden">
            <!-- Barra superior con info del usuario -->
            <div class="user-bar">
                <span id="user-info"></span>
                <span id="token-display" class="token"></span>
                <button id="logout-btn" class="btn btn-danger">Cerrar Sesión</button>
            </div>
            
            <h1>🧮 Calculadora</h1>
            <p id="permissions-info" class="subtitle"></p>
            
            <!-- Display de la calculadora -->
            <input type="text" id="display" class="calculator-display" readonly>
            
            <!-- Botones numéricos -->
            <div class="calculator-grid">
                <button class="btn-num" data-num="7">7</button>
                <button class="btn-num" data-num="8">8</button>
                <button class="btn-num" data-num="9">9</button>
                
                <button class="btn-num" data-num="4">4</button>
                <button class="btn-num" data-num="5">5</button>
                <button class="btn-num" data-num="6">6</button>
                
                <button class="btn-num" data-num="1">1</button>
                <button class="btn-num" data-num="2">2</button>
                <button class="btn-num" data-num="3">3</button>
                
                <button class="btn-num" data-num="0" id="btn-cero">0</button>
            </div>
            
            <!-- Botones de operación y control -->
            <div class="operations-row">
                <button id="btn-suma" class="btn btn-operation">+</button>
                <button id="btn-multiplicacion" class="btn btn-operation">×</button>
                <button id="btn-igual" class="btn btn-equals">=</button>
                <button id="btn-limpiar" class="btn btn-clear">C</button>
            </div>
            
            <!-- Mensaje cuando no tiene permiso -->
            <p id="no-permission" class="error hidden">No tienes permiso para esta operación</p>
        </div>
        
    </div>

    <!-- Enlace a nuestro archivo JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
